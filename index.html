<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCUBADORA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: sans-serif;
    min-height: 100vh;
    background: #000 url('fondo.jpg') center top / cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .overlay {
    width: 100%;
    min-height: 100vh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 50%, rgba(0,0,0,0.95) 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  .top-space { height: 30vw; max-height: 200px; }
  #chapter-title { color: #fff; font-size: 1.1rem; font-weight: bold; margin-bottom: 4px; text-shadow: 0 1px 6px #000; }
  video { width: 100%; max-width: 700px; border-radius: 10px; background: #000; margin-bottom: 14px; }
  .brand { font-size: 2.8rem; font-weight: 900; color: #fff; letter-spacing: 6px; text-shadow: 0 2px 16px rgba(0,0,0,0.8); margin-bottom: 16px; }
  #controls { display: flex; gap: 10px; margin-bottom: 10px; }
  button { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.5); padding: 11px 26px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; font-weight: bold; backdrop-filter: blur(4px); }
  button:hover { background: rgba(255,255,255,0.25); }
  #pipBtn { background: rgba(0,0,0,0.3); font-size: 0.85rem; margin-bottom: 8px; }
  #counter { color: rgba(255,255,255,0.5); font-size: 0.85rem; margin-bottom: 10px; }
  #wakeMsg { color: #f4a261; font-size: 0.75rem; }
</style>
</head>
<body>
<div class="overlay">
  <div class="top-space"></div>
  <div id="chapter-title">Capítulo 1</div>
  <video id="player" controls autoplay playsinline></video>
  <div class="brand">INCUBADORA</div>
  <div id="controls">
    <button onclick="prev()">⬅ Anterior</button>
    <button onclick="next()">Siguiente ➡</button>
  </div>
  <button id="pipBtn" onclick="pip()">⧉ Minimizar video</button>
  <div id="counter"></div>
  <div id="wakeMsg"></div>
</div>

<script>
const videos = [
  { title: "Capítulo 1", url: "https://www.dropbox.com/scl/fi/d8s2lcaphxqwxvw8exgj1/Clase-01-Revu-School.mp4?rlkey=qqk1xd0ar5l605dcqiwetuyih&st=dgy3qmc2&dl=1" },
  { title: "Capítulo 2", url: "https://www.dropbox.com/scl/fi/0p28iga4089wh8dw05z9b/Clase-Esp.-02-29_06.mp4?rlkey=a99n20czfda9wqnle80v4uigh&st=n07jc5xm&dl=1" },
  { title: "Capítulo 3", url: "https://www.dropbox.com/scl/fi/8s33ubuy0gcd74gbnvtl4/clase-03-importaciones-revu-03.mp4?rlkey=aem6ah7v08b1prvt96f5udym0&st=loqbe6h8&dl=1" },
  { title: "Capítulo 4", url: "https://www.dropbox.com/scl/fi/952bbvgzi4s527vs4vr8q/clase-04-importaciones-revu-03.mp4?rlkey=ug6636spykbd4uydf4az5refg&st=gtxow10x&dl=1" },
];

let current = 0;
const player = document.getElementById('player');

function load(i) {
  current = (i + videos.length) % videos.length;
  const v = videos[current];
  player.src = v.url;
  document.getElementById('chapter-title').textContent = v.title;
  document.getElementById('counter').textContent = `${current + 1} / ${videos.length}`;
  player.play();
}

player.addEventListener('ended', () => load(current + 1));
function next() { load(current + 1); }
function prev() { load(current - 1); }

function pip() {
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture();
  } else if (player.requestPictureInPicture) {
    player.requestPictureInPicture();
  }
}

// Wake Lock - pantalla activa
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      await navigator.wakeLock.request('screen');
      document.getElementById('wakeMsg').textContent = '✓ Pantalla activa';
    }
  } catch(e) {}
}
keepAwake();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});

load(0);
</script>
</body>
</html>
