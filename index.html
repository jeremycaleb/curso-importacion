<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>INCUBADORA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: sans-serif;
    min-height: 100vh;
    background: #0a1628;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hero {
    width: 100%;
    height: 45vw;
    max-height: 360px;
    background: url('fondo.jpg') center center / cover no-repeat;
    position: relative;
    flex-shrink: 0;
  }
  .hero::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60%;
    background: linear-gradient(to bottom, transparent, #0a1628);
  }
  .content {
    width: 100%;
    background: linear-gradient(to bottom, #0a1628, #05090f);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 20px 30px;
  }
  #chapter-title { color: #ccc; font-size: 0.95rem; margin-bottom: 8px; }
  video { width: 100%; max-width: 700px; border-radius: 10px; background: #000; margin-bottom: 16px; }
  #controls { display: flex; gap: 10px; margin-bottom: 10px; }
  button { background: rgba(255,255,255,0.1); color: #fff; border: 1px solid rgba(255,255,255,0.3); padding: 11px 26px; border-radius: 50px; font-size: 0.95rem; cursor: pointer; font-weight: bold; }
  button:hover { background: rgba(255,255,255,0.2); }
  #pipBtn { font-size: 0.82rem; margin-bottom: 14px; }
  .bottom-row {
    width: 100%;
    max-width: 700px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .logo { width: 151px; opacity: 0.95; }
  .profesor { width: 117px; opacity: 0.95; }
  #counter { color: rgba(255,255,255,0.4); font-size: 0.8rem; margin-bottom: 6px; }
  #wakeMsg { color: #4caf50; font-size: 0.72rem; }
</style>
</head>
<body>
<div class="hero"></div>
<div class="content">
  <div id="chapter-title">Capítulo 1</div>
  <video id="player" controls autoplay playsinline></video>
  <div id="controls">
    <button onclick="prev()">⬅ Anterior</button>
    <button onclick="next()">Siguiente ➡</button>
  </div>
  <button id="pipBtn" onclick="pip()">⧉ Minimizar video</button>
  <div class="bottom-row">
    <img src="incubadora_logo_blanco.png" class="logo" alt="INCUBADORA">
    <img src="profesor.png" class="profesor" alt="Profesor">
  </div>
  <div id="counter"></div>
  <div id="wakeMsg"></div>
</div>

<script>
const videos = [
  { title: "Capítulo 1", url: "https://www.dropbox.com/scl/fi/d8s2lcaphxqwxvw8exgj1/Clase-01-Revu-School.mp4?rlkey=qqk1xd0ar5l605dcqiwetuyih&st=dgy3qmc2&dl=1" },
  { title: "Capítulo 2", url: "https://www.dropbox.com/scl/fi/0p28iga4089wh8dw05z9b/Clase-Esp.-02-29_06.mp4?rlkey=a99n20czfda9wqnle80v4uigh&st=n07jc5xm&dl=1" },
  { title: "Capítulo 3", url: "https://www.dropbox.com/scl/fi/8s33ubuy0gcd74gbnvtl4/clase-03-importaciones-revu-03.mp4?rlkey=aem6ah7v08b1prvt96f5udym0&st=loqbe6h8&dl=1" },
  { title: "Capítulo 4", url: "https://www.dropbox.com/scl/fi/952bbvgzi4s527vs4vr8q/clase-04-importaciones-revu-03.mp4?rlkey=ug6636spykbd4uydf4az5refg&st=gtxow10x&dl=1" },
];

let current = 0;
const player = document.getElementById('player');

function load(i) {
  current = (i + videos.length) % videos.length;
  const v = videos[current];
  player.src = v.url;
  document.getElementById('chapter-title').textContent = v.title;
  document.getElementById('counter').textContent = `${current + 1} / ${videos.length}`;
  player.play();
}

player.addEventListener('ended', () => load(current + 1));
function next() { load(current + 1); }
function prev() { load(current - 1); }

function pip() {
  if (document.pictureInPictureElement) {
    document.exitPictureInPicture();
  } else if (player.requestPictureInPicture) {
    player.requestPictureInPicture();
  }
}

let wakeLock = null;
async function keepAwake() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      document.getElementById('wakeMsg').textContent = '✓ Pantalla activa';
    }
  } catch(e) {}
}
keepAwake();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});

if ('mediaSession' in navigator) {
  navigator.mediaSession.metadata = new MediaMetadata({
    title: 'INCUBADORA',
    artist: 'Curso de Importación',
  });
  navigator.mediaSession.setActionHandler('play', () => player.play());
  navigator.mediaSession.setActionHandler('pause', () => player.pause());
}

load(0);
</script>
</body>
</html>
